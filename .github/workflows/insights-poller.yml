name: Insights Poller

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger insights poller
        run: |
          curl -sf -X POST \
            https://storiscast-api.onrender.com/internal/trigger/insights-poller \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
