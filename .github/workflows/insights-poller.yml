name: Insights Poller

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m cron.insights_poller
        env:
          DATABASE_URL:            ${{ secrets.DATABASE_URL }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          FERNET_KEY:              ${{ secrets.FERNET_KEY }}
          VK_ACCESS_TOKEN:         ${{ secrets.VK_ACCESS_TOKEN }}
          TG_API_ID:               ${{ secrets.TG_API_ID }}
          TG_API_HASH:             ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING:       ${{ secrets.TG_SESSION_STRING }}
          IG_ACCESS_TOKEN:         ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:              ${{ secrets.IG_USER_ID }}
          IG_GRAPH_API_VERSION:    ${{ secrets.IG_GRAPH_API_VERSION }}
          DEFAULT_TENANT_ID:       00000000-0000-0000-0000-000000000001
