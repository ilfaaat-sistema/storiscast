name: Publish Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger publish worker
        run: |
          curl -sf -X POST \
            https://storiscast-api.onrender.com/internal/trigger/publish-worker \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
